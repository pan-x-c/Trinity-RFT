mode: explore
project: Trinity-RFT
group: explorer-perf
name: example
checkpoint_root_dir: ${oc.env:TRINITY_CHECKPOINT_ROOT_DIR,/tmp/trinity-checkpoints}

algorithm:
  algorithm_type: grpo
  repeat_times: 8

model:
  model_path: ${oc.env:TRINITY_MODEL_PATH,Qwen/Qwen3.5-0.8B}
  max_prompt_tokens: 32768
  max_response_tokens: 8192

cluster:
  ray_address: ${oc.env:RAY_ADDRESS,auto}
  node_num: 1
  gpu_per_node: 4

buffer:
  batch_size: 32
  total_steps: 5
  explorer_input:
    taskset:
      name: taskset
      storage_type: file
      path: ${oc.env:TRINITY_TASKSET_PATH,null}
      split: train
      format:
        prompt_key: question
        response_key: answer
      rollout_args:
        temperature: 1.0
        logprobs: 0
      workflow_type: math_workflow
      reward_fn_type: countdown_reward
    eval_tasksets: []

explorer:
  runner_per_model: 4
  max_timeout: 900
  max_retry_times: 0
  eval_interval: 1000
  eval_on_startup: false
  rollout_model:
    engine_num: 1
    tensor_parallel_size: 1
    enforce_eager: false
    enable_prefix_caching: true
    enable_chunked_prefill: true
    gpu_memory_utilization: 0.85
    dtype: bfloat16
    seed: 42
    enable_openai_api: false

monitor:
  monitor_type: tensorboard

synchronizer:
  sync_method: checkpoint
  sync_style: fixed
  sync_interval: 20
  sync_timeout: 1200
